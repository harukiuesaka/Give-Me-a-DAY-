name: OpenHands Issue Resolver

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    if: >-
      (github.event_name == 'issues' && github.event.label.name == 'fix-me') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@openhands-agent'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Resolve issue number
        id: issue_info
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          else
            ISSUE_URL="${{ github.event.issue.url }}"
            NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
            echo "number=$NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Auto-fix via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAT_USERNAME: ${{ secrets.PAT_USERNAME }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.issue_info.outputs.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 - << 'PYEOF'
          import os, json, subprocess, sys
          import urllib.request, urllib.error

          ANTHROPIC_API_KEY = os.environ.get("ANTHROPIC_API_KEY", "")
          PAT_TOKEN = os.environ.get("PAT_TOKEN", "")
          PAT_USERNAME = os.environ.get("PAT_USERNAME", "")
          REPO = os.environ.get("REPO", "")
          ISSUE_NUMBER = os.environ.get("ISSUE_NUMBER", "")
          ISSUE_TITLE = os.environ.get("ISSUE_TITLE", "")
          ISSUE_BODY = os.environ.get("ISSUE_BODY", "")

          if not ISSUE_NUMBER or not ISSUE_TITLE:
              print("No issue info, skipping")
              sys.exit(0)

          print(f"Processing issue #{ISSUE_NUMBER}: {ISSUE_TITLE}")

          result = subprocess.run(
              ["git", "ls-files", "--", "*.md", "*.sh", "*.py", "*.yml"],
              capture_output=True, text=True
          )
          file_list = [f for f in result.stdout.strip().split("\n") if f][:40]

          keywords = (ISSUE_TITLE.lower() + " " + ISSUE_BODY.lower()).split()
          keywords = [k for k in keywords if len(k) > 3][:20]
          relevant = [f for f in file_list if any(k in f.lower() for k in keywords)]
          if not relevant:
              relevant = [f for f in file_list if any(
                  x in f.lower() for x in ["open_loop", "current_state", "session"]
              )]
          if not relevant:
              relevant = file_list[:5]

          file_contents = {}
          for f in relevant[:6]:
              try:
                  with open(f, "r", encoding="utf-8", errors="replace") as fh:
                      file_contents[f] = fh.read()[:4000]
              except Exception as e:
                  print(f"Warning: {f}: {e}")

          context = "\n\n".join(
              "File: " + k + "\n```\n" + v + "\n```" for k, v in file_contents.items()
          )

          prompt = (
              "You are an autonomous code agent. Fix this GitHub issue with a minimal file change.\n\n"
              + "Issue #" + ISSUE_NUMBER + ": " + ISSUE_TITLE + "\n\n"
              + "Issue body:\n" + ISSUE_BODY[:2000] + "\n\n"
              + "Relevant files:\n" + context + "\n\n"
              + 'Return ONLY a JSON object: {"file": "path", "content": "full content", "explanation": "one sentence"}\n\n'
              + 'If no change needed: {"file": null, "content": null, "explanation": "already resolved"}'
          )

          payload = json.dumps({
              "model": "claude-3-haiku-20240307",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": ANTHROPIC_API_KEY,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  response = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print(f"API HTTP error {e.code}: {body}")
              sys.exit(1)
          except Exception as e:
              print(f"API error: {e}")
              sys.exit(1)

          text = response["content"][0]["text"].strip()
          if text.startswith("```"):
              lines = text.split("\n")
              text = "\n".join(lines[1:])
              if text.endswith("```"):
                  text = text[:-3].strip()

          result_data = json.loads(text)
          print("Claude: " + result_data.get("explanation", ""))

          if not result_data.get("file") or not result_data.get("content"):
              print("No change needed.")
              sys.exit(0)

          target_file = result_data["file"]
          new_content = result_data["content"]

          if "/" in target_file:
              os.makedirs(os.path.dirname(target_file), exist_ok=True)
          with open(target_file, "w", encoding="utf-8") as fh:
              fh.write(new_content)

          branch_name = "fix/issue-" + ISSUE_NUMBER + "-auto"
          subprocess.run(["git", "config", "user.email", "openhands@all-hands.dev"], check=True)
          subprocess.run(["git", "config", "user.name", "OpenHands"], check=True)
          subprocess.run(["git", "checkout", "-b", branch_name], check=True)
          subprocess.run(["git", "add", target_file], check=True)
          commit_msg = "fix: issue #" + ISSUE_NUMBER + " — " + result_data["explanation"][:60]
          subprocess.run(["git", "commit", "-m", commit_msg], check=True)

          remote_url = "https://" + PAT_USERNAME + ":" + PAT_TOKEN + "@github.com/" + REPO + ".git"
          subprocess.run(["git", "remote", "set-url", "origin", remote_url], check=True)
          subprocess.run(["git", "push", "origin", branch_name], check=True)
          print("Pushed: " + branch_name)

          pr_payload = json.dumps({
              "title": "Fix: Issue #" + ISSUE_NUMBER + " — " + ISSUE_TITLE[:60],
              "body": "Auto-fix for #" + ISSUE_NUMBER + "\n\n" + result_data["explanation"] + "\n\nCloses #" + ISSUE_NUMBER,
              "head": branch_name,
              "base": "main"
          }).encode("utf-8")

          pr_req = urllib.request.Request(
              "https://api.github.com/repos/" + REPO + "/pulls",
              data=pr_payload,
              headers={
                  "Authorization": "token " + PAT_TOKEN,
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              },
              method="POST"
          )
          with urllib.request.urlopen(pr_req, timeout=30) as resp:
              pr_data = json.loads(resp.read().decode("utf-8"))
          print("PR: #" + str(pr_data["number"]) + " " + pr_data["html_url"])

          with open("/tmp/fix_result.json", "w") as f:
              json.dump({
                  "pr_number": pr_data["number"],
                  "pr_url": pr_data["html_url"],
                  "explanation": result_data["explanation"]
              }, f)
          PYEOF

      - name: Comment on issue
        uses: actions/github-script@v7
        if: always()
        env:
          ISSUE_NUMBER: ${{ steps.issue_info.outputs.number }}
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            if (!issueNumber) return;
            let body = '⚠️ Auto-fix が実行されましたが PR は作成されませんでした。ログを確認してください。';
            if (fs.existsSync('/tmp/fix_result.json')) {
              const r = JSON.parse(fs.readFileSync('/tmp/fix_result.json', 'utf8'));
              body = `✅ 修正完了。PR #${r.pr_number} を作成しました: ${r.pr_url}\n\n> ${r.explanation}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            }).catch(console.error);
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              name: 'fix-me'
            }).catch(() => {});
