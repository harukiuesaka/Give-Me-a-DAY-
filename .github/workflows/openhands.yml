name: OpenHands Issue Resolver

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  openhands-resolver:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'fix-me') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@openhands-agent'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-openhands-ai-1.5.0
          restore-keys: pip-openhands-ai-

      - name: Install openhands-ai (PyPI wheel)
        run: pip install openhands-ai==1.5.0

      - name: Resolve issue
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.PAT_USERNAME }}
          GIT_USERNAME: ${{ secrets.PAT_USERNAME }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'anthropic/claude-haiku-4-5-20251001' }}
          LLM_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SANDBOX_ENV_GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_BRANCH: ${{ vars.TARGET_BRANCH || 'main' }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.comment.issue.number }}
          cd /tmp
          python -m openhands.resolver.resolve_issue \
            --selected-repo ${{ github.repository }} \
            --issue-number ${ISSUE_NUMBER} \
            --issue-type issue \
            --max-iterations 30 \
            --comment-id None \
            --is-experimental false

      - name: Comment on issue with result
        uses: actions/github-script@v7
        if: always()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.comment.issue.number }}
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const outputPath = '/tmp/output/output.jsonl';

            let success = false;
            let prNumber = null;
            let branchName = null;
            let explanation = '';

            if (fs.existsSync(outputPath)) {
              const lines = fs.readFileSync(outputPath, 'utf8')
                .split('\n').filter(l => l.trim());
              if (lines.length > 0) {
                const result = JSON.parse(lines[0]);
                success = result.success || false;
                prNumber = result.pr_number || null;
                branchName = result.base_branch || null;
                explanation = result.result_explanation || '';
              }
            }

            if (success && prNumber) {
              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ OpenHands が修正を完了しました。PR #${prNumber} を作成しました。`
              });
              await github.rest.issues.removeLabel({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'fix-me'
              }).catch(() => {});
            } else {
              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `⚠️ OpenHands が修正を試みましたが、PRを作成できませんでした。${explanation ? '\n\n' + explanation : ''}`
              }).catch(() => {});
            }
