name: LLM Quality Eval Run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic pydantic pydantic-settings

      - name: Run eval
        env:
          # Provider: DeepSeek via Anthropic-compatible API.
          # To revert to Anthropic-hosted: change LLM_API_KEY to secrets.ANTHROPIC_API_KEY,
          # set LLM_BASE_URL to empty string, set LLM_MODEL to claude-3-haiku-20240307.
          LLM_API_KEY: ${{ secrets.deepseekllm }}
          LLM_BASE_URL: "https://api.deepseek.com"
          LLM_MODEL: "deepseek-chat"
          LLM_PROVIDER: "deepseek"
        run: |
          cd ${{ github.workspace }}
          PYTHONPATH=backend/src python3 scripts/eval_runner.py || true

      - name: Show results
        if: always()
        run: |
          echo "=== evals/results/ after run ==="
          ls -lh evals/results/
          echo ""
          echo "=== Latest run file ==="
          latest=$(ls -t evals/results/run_*.jsonl 2>/dev/null | head -1)
          if [ -n "$latest" ]; then
            echo "File: $latest"
            echo "Records: $(wc -l < $latest)"
            python3 -c "
          import json
          with open('$latest') as f:
              lines = f.readlines()
          if lines:
              first = json.loads(lines[0])
              print(f'Provider: {first.get(\"provider\", \"unknown\")}  Model: {first.get(\"model\", \"unknown\")}')
          for line in lines:
              r = json.loads(line)
              print(f'  {r[\"case_id\"]}: {r[\"status\"]}' + (f' -- {r[\"error\"][:120]}' if r.get('error') else ''))
          "
          else
            echo "No run file found."
          fi

      - name: Commit results
        if: always()
        run: |
          git config user.email "haruki121731@icloud.com"
          git config user.name "Haruki"
          git add evals/results/
          if git diff --cached --quiet; then
            echo "No new results to commit"
          else
            git commit -m "chore: eval run results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD
          fi
