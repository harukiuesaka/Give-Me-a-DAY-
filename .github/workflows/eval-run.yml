name: LLM Quality Eval Run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic pydantic pydantic-settings

      - name: Verify API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.DeepSeek_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: DeepSeek_API_KEY secret is not set or empty."
            echo "Go to Settings > Secrets > DeepSeek_API_KEY and confirm it has a value."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY: set (length=${#ANTHROPIC_API_KEY})"
          echo "Provider config: LLM_PROVIDER=deepseek  LLM_BASE_URL=https://api.deepseek.com/anthropic  LLM_MODEL=deepseek-chat"

      - name: Run eval
        env:
          # Provider: DeepSeek via Anthropic-compatible API (Anthropic SDK, custom base_url).
          # ANTHROPIC_API_KEY is the Anthropic SDK naming convention — used as primary key env var.
          # To revert to Anthropic-hosted: set ANTHROPIC_API_KEY to secrets.ANTHROPIC_API_KEY,
          # clear LLM_BASE_URL (empty string), set LLM_MODEL to claude-3-haiku-20240307.
          ANTHROPIC_API_KEY: ${{ secrets.DeepSeek_API_KEY }}
          LLM_BASE_URL: "https://api.deepseek.com/anthropic"
          LLM_MODEL: "deepseek-chat"
          LLM_PROVIDER: "deepseek"
        run: |
          cd ${{ github.workspace }}
          PYTHONPATH=backend/src python3 scripts/eval_runner.py

      - name: Show results
        if: always()
        run: |
          echo "=== evals/results/ after run ==="
          ls -lht evals/results/
          echo ""
          echo "=== Latest run file ==="
          latest=$(ls -t evals/results/run_*.jsonl 2>/dev/null | head -1)
          if [ -n "$latest" ]; then
            echo "File: $latest"
            echo "Records: $(wc -l < $latest)"
            python3 -c "
          import json, os
          from datetime import datetime, timezone, timedelta
          with open('$latest') as f:
              lines = f.readlines()
          if lines:
              first = json.loads(lines[0])
              provider = first.get('provider', 'unknown')
              model = first.get('model', 'unknown')
              run_date = first.get('run_date', 'unknown')
              print(f'Provider: {provider}  Model: {model}  run_date: {run_date}')
              # Warn if reading stale data (file was not created this run)
              mtime = os.path.getmtime('$latest')
              age_min = (datetime.now(timezone.utc).timestamp() - mtime) / 60
              if age_min > 5:
                  print(f'WARNING: This file is {age_min:.0f} min old — likely pre-existing data, not from this run.')
          for line in lines:
              r = json.loads(line)
              print(f'  {r[\"case_id\"]}: {r[\"status\"]}' + (f' -- {r[\"error\"][:120]}' if r.get('error') else ''))
          "
          else
            echo "No run file found."
          fi

      - name: Commit results
        if: always()
        run: |
          git config user.email "haruki121731@icloud.com"
          git config user.name "Haruki"
          git add evals/results/
          if git diff --cached --quiet; then
            echo "No new results to commit"
          else
            git commit -m "chore: eval run results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD
          fi
